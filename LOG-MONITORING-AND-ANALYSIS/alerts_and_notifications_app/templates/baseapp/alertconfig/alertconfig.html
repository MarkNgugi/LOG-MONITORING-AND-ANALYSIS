<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Configuration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .section h2 {
            color: #007bff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .section label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .section input[type="text"], .section input[type="number"], .section select, .section textarea {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .section input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .section input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alert Configuration</h1>

        <div class="section">
            <h2>Alert Details</h2>
            <label for="alert-name">Alert Name:</label>
            <input type="text" id="alert-name" name="alert-name" placeholder="Enter alert name" required>

            <label for="alert-description">Description:</label>
            <textarea id="alert-description" name="alert-description" placeholder="Enter alert description" rows="4" required></textarea>
        </div>

        <div class="section">
            <h2>Alert Conditions</h2>
            <label for="alert-type">Alert Type:</label>
            <select id="alert-type" name="alert-type">
                <option value="threshold">Threshold-based</option>
                <option value="anomaly">Anomaly Detection</option>
                <option value="error">Error-specific</option>
            </select>

            <label for="condition">Condition:</label>
            <input type="text" id="condition" name="condition" placeholder="e.g., CPU usage > 90%" required>
        </div>

        <div class="section">
            <h2>Severity and Frequency</h2>
            <label for="severity">Severity Level:</label>
            <select id="severity" name="severity">
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>

            <label for="frequency">Alert Frequency (minutes):</label>
            <input type="number" id="frequency" name="frequency" min="1" value="5" required>
        </div>

        <div class="section">
            <h2>Notification and Actions</h2>
            <label for="notification-channel">Notification Channel:</label>
            <select id="notification-channel" name="notification-channel">
                <option value="email">Email</option>
                <option value="sms">SMS</option>
                <option value="slack">Slack</option>
                <option value="webhook">Webhook</option>
            </select>

            <label for="recipients">Alert Recipients:</label>
            <input type="text" id="recipients" name="recipients" placeholder="Enter recipient emails, separated by commas" required>

            <label for="actions">Alert Actions:</label>
            <input type="text" id="actions" name="actions" placeholder="e.g., Run script, Restart service" required>
        </div>

        <div class="section">
            <h2>Escalation Policy</h2>
            <label for="escalation-time">Escalation Time (minutes):</label>
            <input type="number" id="escalation-time" name="escalation-time" min="1" value="10" required>

            <label for="escalation-action">Escalation Action:</label>
            <input type="text" id="escalation-action" name="escalation-action" placeholder="e.g., Notify admin" required>
        </div>

        <div class="section">
            <h2>Alert History</h2>
            <p>View and manage past alerts and their resolutions.</p>
            <a href="#" class="button">View Alert History</a>
        </div>

        <div class="section">
            <input type="submit" value="Save Alert Configuration">
        </div>
    </div>

</body>
</html>
