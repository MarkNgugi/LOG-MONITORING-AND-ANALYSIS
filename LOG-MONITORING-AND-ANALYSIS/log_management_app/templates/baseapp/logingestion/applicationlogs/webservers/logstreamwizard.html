{% extends 'mainhome.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-11">
            <h2 class="page-title">Log streaming</h2>
            <p>Using jQuery Steps as default wizard plugin. That is an extremely flexible, compact and feature-rich plugin.</p>

            <div class="row justify-content-center">
                <div class="col-md-4 col-xl-2 mb-4">
                    <div class="card shadow border-0" data-webserver="apache">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-3 text-center">
                                    <span class="circle circle-sm bg-primary">
                                        <i class="fe fe-16 fe-activity text-white mb-0"></i>
                                    </span>
                                </div>
                                <div class="col">
                                    <span class="h4 mb-0 text-white">Apache</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 col-xl-2 mb-4">
                  <div class="card shadow border-0" data-webserver="nginx">
                      <div class="card-body">
                          <div class="row align-items-center">
                              <div class="col-3 text-center">
                                  <span class="circle circle-sm bg-primary">
                                      <i class="fe fe-16 fe-activity text-white mb-0"></i>
                                  </span>
                              </div>
                              <div class="col">
                                  <span class="h4 mb-0 text-white">Nginx</span>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
              
              <div class="col-md-4 col-xl-2 mb-4">
                <div class="card shadow border-0" data-webserver="iis">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-3 text-center">
                                <span class="circle circle-sm bg-primary">
                                    <i class="fe fe-16 fe-activity text-white mb-0"></i>
                                </span>
                            </div>
                            <div class="col">
                                <span class="h4 mb-0 text-white">IIS</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 col-xl-2 mb-4">
              <div class="card shadow border-0" data-webserver="tomcat">
                  <div class="card-body">
                      <div class="row align-items-center">
                          <div class="col-3 text-center">
                              <span class="circle circle-sm bg-primary">
                                  <i class="fe fe-16 fe-activity text-white mb-0"></i>
                              </span>
                          </div>
                          <div class="col">
                              <span class="h4 mb-0 text-white">Tomcat</span>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
          
          <div class="col-md-4 col-xl-2 mb-4">
            <div class="card shadow border-0" data-webserver="lighttpd">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-3 text-center">
                            <span class="circle circle-sm bg-primary">
                                <i class="fe fe-16 fe-activity text-white mb-0"></i>
                            </span>
                        </div>
                        <div class="col">
                            <span class="h4 mb-0 text-white">Lighttpd</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>          
      
        </div>

            <div class="card my-4">
                <div class="card-header">
                    <strong>Validation</strong>
                </div>
                <div class="card-body">
                    <form id="example-form" action="#">
                        <div id="form-container">
                            <!-- The dynamic form will be loaded here -->
                        </div>
                    </form>
                </div> <!-- .card-body -->
            </div> <!-- .card -->
        </div> <!-- .col-12 -->
    </div> <!-- .row -->
</div> <!-- .container-fluid -->

<script>
  document.addEventListener('DOMContentLoaded', function() {
      var cards = document.querySelectorAll('.card');
  
      cards.forEach(function(card) {
          card.addEventListener('click', function() {
              // Remove the background color from all cards
              cards.forEach(function(c) {
                  c.querySelector('.card-body').style.backgroundColor = '';
              });
  
              // Add background color to the clicked card
              this.querySelector('.card-body').style.backgroundColor = '#1b68ff';
  
              // Handle form loading
              var webserver = this.getAttribute('data-webserver');
              var url = '';
  
              switch (webserver) {
                  case 'apache':
                      url = '{% url "apacheserverlogstream" %}';
                      break;
                  case 'nginx':
                      url = '{% url "nginxserverlogstream" %}';
                      break;
                  case 'iis':
                      url = '{%url "iisserverlogstream" %}';
                      break;
                  case 'tomcat':
                      url = '{%url "tomcatserverlogstream" %}';
                      break;
                  case 'lighttpd':
                      url = '{%url "lighttpdserverlogstream" %}';
                      break;                                            
                  // Add other cases as needed
              }
  
              if (url) {
                  fetch(url)
                      .then(response => response.text())
                      .then(html => {
                          document.getElementById('form-container').innerHTML = html;
                      })
                      .catch(error => console.error('Error loading the form:', error));
              }
          });
      });
  });
  </script>
  

{% endblock %}
